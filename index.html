<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presenter</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        accent: { DEFAULT: '#f85526', light: '#ff7a54', dark: '#c43e17', muted: 'rgba(248,85,38,0.12)' },
        surface: { 0: '#09090b', 1: '#111113', 2: '#18181b', 3: '#1f1f23', 4: '#27272a' },
        border: { DEFAULT: '#27272a', light: '#3f3f46', muted: '#1f1f23' },
        txt: { primary: '#fafafa', secondary: '#a1a1aa', muted: '#71717a', dim: '#52525b' }
      },
      fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
      boxShadow: {
        glow: '0 0 20px rgba(248,85,38,0.15)',
        card: '0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3)',
        elevated: '0 4px 12px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.3)',
      }
    }
  }
}
</script>
<style>
:root { --prompter-bg: #0c0c0e; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #09090b; color: #fafafa; }

/* Sidebar animation */
.sidebar-wrap { width: 240px; min-width: 240px; transition: width 0.35s cubic-bezier(0.4,0,0.2,1), min-width 0.35s cubic-bezier(0.4,0,0.2,1); }
.sidebar-wrap.collapsed { width: 0; min-width: 0; }
.sidebar-wrap.collapsed .sidebar-inner { opacity: 0; pointer-events: none; }
.sidebar-inner { transition: opacity 0.25s ease 0.1s; }

/* Canvas overlay */
#drawCanvas { position: absolute; inset: 0; z-index: 30; }
.cursor-pen, .cursor-highlighter { cursor: crosshair; }
.cursor-laser { cursor: none; }

/* Laser */
.laser-dot {
  position: fixed; width: 18px; height: 18px; border-radius: 50%;
  background: radial-gradient(circle, #ff1a1a 0%, rgba(255,26,26,0.5) 55%, transparent 100%);
  box-shadow: 0 0 16px 6px rgba(255,26,26,0.45), 0 0 4px 2px rgba(255,26,26,0.8);
  pointer-events: none; z-index: 50; display: none; transform: translate(-50%,-50%);
  animation: laser-pulse 1.2s ease-in-out infinite;
}
@keyframes laser-pulse { 0%,100% { box-shadow: 0 0 16px 6px rgba(255,26,26,0.45); } 50% { box-shadow: 0 0 24px 10px rgba(255,26,26,0.6); } }

/* ===== FIXED-CANVAS SLIDE SYSTEM =====
   Design at 960×540 (16:9), auto-scale to fit any container.
   All font sizes are absolute — scaling handles responsiveness. */

.slide-canvas {
  width: 960px; height: 540px;
  position: absolute; top: 50%; left: 50%;
  transform-origin: center center;
  /* transform: translate(-50%,-50%) scale(X) is set by JS */
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  padding: 50px 60px;
}

/* Slide content rendering — sizes designed for 960×540 canvas */
.slide-rendered { width: 100%; position: relative; }
.slide-rendered h1 { font-size: 38px; font-weight: 800; letter-spacing: -0.025em; line-height: 1.2; margin-bottom: 16px; color: #fafafa; }
.slide-rendered h2 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.3; margin-bottom: 12px; color: #fafafa; }
.slide-rendered h3 { font-size: 22px; font-weight: 600; line-height: 1.35; margin-bottom: 10px; color: #e4e4e7; }
.slide-rendered p { font-size: 20px; line-height: 1.6; margin-bottom: 10px; color: #d4d4d8; }
.slide-rendered li { font-size: 19px; line-height: 1.6; margin-bottom: 6px; color: #d4d4d8; }
.slide-rendered ul { list-style: none; padding-left: 24px; margin-bottom: 10px; }
.slide-rendered ul li { position: relative; padding-left: 4px; }
.slide-rendered ul li::before { content: ''; position: absolute; left: -18px; top: 0.55em; width: 7px; height: 7px; border-radius: 50%; background: #f85526; opacity: 0.7; }
.slide-rendered ol { list-style: decimal; padding-left: 24px; margin-bottom: 10px; }
.slide-rendered strong { color: #fafafa; font-weight: 700; }
.slide-rendered em { color: #a1a1aa; font-style: italic; }
.slide-rendered code { background: rgba(248,85,38,0.1); color: #ff7a54; padding: 0.1em 0.35em; border-radius: 4px; font-size: 0.9em; }

/* Progress bar */
.slide-progress-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 100;
  background: linear-gradient(90deg, #f85526, #ff7a54);
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 8px rgba(248,85,38,0.3);
}

/* Background decorative number */
.bg-number {
  position: absolute; bottom: -20px; right: -10px;
  font-size: 200px; font-weight: 900; line-height: 1;
  color: #f85526; opacity: 0.06;
  pointer-events: none; user-select: none;
}

/* Keyword giant */
.keyword {
  display: block; font-size: 56px; font-weight: 900;
  letter-spacing: -0.04em; line-height: 1.1;
  color: #f85526; margin: 12px 0;
}

/* Stat number */
.stat-block { display: inline-flex; flex-direction: column; align-items: center; margin: 16px 0; }
.stat-number { font-size: 52px; font-weight: 900; color: #f85526; line-height: 1.1; letter-spacing: -0.03em; }
.stat-label { font-size: 17px; color: #a1a1aa; margin-top: 6px; font-weight: 500; }

/* Highlight inline */
.hl-inline {
  background: #f85526; color: #09090b; padding: 0.05em 0.4em;
  border-radius: 3px; font-weight: 700;
}

/* Layout: statement — vertically centered, bigger text */
.layout-statement .slide-canvas { text-align: center; }
.layout-statement .slide-rendered h1 { font-size: 42px; }

/* Layout: quote */
.layout-quote .slide-canvas { text-align: center; }
.layout-quote .slide-rendered blockquote {
  font-size: 26px; line-height: 1.5; border: none; padding: 0;
  background: none; border-radius: 0;
  color: #d4d4d8; font-style: italic;
}
.layout-quote .slide-rendered blockquote::before {
  content: '\201C'; display: block; font-size: 64px; color: #f85526;
  opacity: 0.25; line-height: 0.5; margin-bottom: 12px;
}

/* Layout: stats */
.layout-stats .slide-canvas { text-align: center; }
.layout-stats .stat-number { font-size: 60px; }

/* Layout: list */
.layout-list .slide-rendered ul li::before { width: 9px; height: 9px; opacity: 0.9; }
.layout-list .slide-rendered li { font-size: 21px; margin-bottom: 10px; }

/* Slide entry animation */
.slide-enter { animation: slide-enter 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
@keyframes slide-enter {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Prompter rendering */
.prompter-rendered { font-size: 1.65rem; line-height: 2; font-weight: 400; color: #d4d4d8; }
.prompter-rendered strong { color: #fafafa; font-weight: 600; }
.prompter-rendered em { color: #a1a1aa; }
.prompter-rendered li { margin-bottom: 0.35rem; }
.prompter-rendered ul, .prompter-rendered ol { padding-left: 1.5rem; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #52525b; }

/* Slide transition */
.slide-transition { animation: slide-in 0.3s ease-out; }
@keyframes slide-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Tool button glow on active */
.tool-active-glow { box-shadow: 0 0 12px rgba(248,85,38,0.4), inset 0 1px 0 rgba(255,255,255,0.1); }

/* Animated gradient background for slide area */
.slide-gradient-bg {
  position: absolute; inset: 0; z-index: 0;
  background: linear-gradient(45deg, #09090b, #1a0800, #0d0000, #09090b, #0a0500);
  background-size: 400% 400%;
  animation: gradientShift 15s ease infinite;
}
@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  25% { background-position: 100% 0%; }
  50% { background-position: 100% 100%; }
  75% { background-position: 0% 100%; }
  100% { background-position: 0% 50%; }
}

/* Slide accent highlights */
.slide-rendered .accent, .slide-rendered .hl { color: #f85526; }
.slide-rendered blockquote {
  border-left: 4px solid #f85526; padding: 16px 20px; margin: 14px 0;
  background: rgba(248,85,38,0.04); border-radius: 0 8px 8px 0;
  color: #d4d4d8; font-style: italic; font-size: 21px; line-height: 1.5;
}
.slide-rendered hr {
  border: none; height: 2px; margin: 20px 0;
  background: linear-gradient(90deg, transparent, rgba(248,85,38,0.4), transparent);
  animation: hr-fade 0.8s ease-out;
}
@keyframes hr-fade { from { opacity: 0; transform: scaleX(0.3); } to { opacity: 1; transform: scaleX(1); } }

/* Pillar number badge in slides */
.pillar-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 3rem; height: 3rem; border-radius: 1rem;
  background: rgba(248,85,38,0.12); color: #f85526;
  font-size: 1.5rem; font-weight: 800; margin-bottom: 0.75rem;
  font-family: 'Inter', sans-serif;
}
</style>
</head>
<body class="bg-surface-0 text-txt-primary font-sans antialiased">

<!-- Progress bar -->
<div id="progressBar" class="slide-progress-bar" style="width: 0%"></div>

<!-- ==================== PRESENTATION VIEW ==================== -->
<div id="presentationView" class="flex h-full w-full">

  <!-- ===== LEFT HALF ===== -->
  <div class="w-1/2 flex h-full relative">

    <!-- Sidebar -->
    <div id="sidebarWrap" class="sidebar-wrap h-full bg-surface-2 border-r border-border flex-shrink-0 relative z-10">
      <div class="sidebar-inner h-full flex flex-col overflow-hidden">
        <!-- Header -->
        <div class="flex items-center gap-2.5 px-4 py-4 border-b border-border-muted flex-shrink-0">
          <div class="w-7 h-7 rounded-lg bg-accent-muted flex items-center justify-center flex-shrink-0">
            <svg class="w-3.5 h-3.5 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
          </div>
          <span class="text-xs font-bold text-txt-secondary uppercase tracking-wider truncate">Vidéos</span>
        </div>
        <!-- Video list -->
        <div id="sidebarVideoList" class="flex-1 overflow-y-auto py-2 px-2 space-y-0.5"></div>
      </div>
      <!-- Toggle button -->
      <button id="sidebarToggle" onclick="toggleSidebar()"
        class="absolute top-1/2 -translate-y-1/2 -right-3.5 z-20 w-7 h-14 bg-surface-3 border border-border-light rounded-r-lg flex items-center justify-center text-txt-muted hover:text-txt-primary hover:bg-surface-4 transition-all duration-200 shadow-card group"
        title="Réduire la sidebar">
        <svg class="w-3.5 h-3.5 transition-transform duration-300 group-hover:scale-110" id="sidebarChevron" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      </button>
    </div>

    <!-- Prompter zone -->
    <div class="flex-1 flex flex-col h-full min-w-0" style="background: var(--prompter-bg)">

      <!-- Top bar: admin + slide nav -->
      <div class="flex-shrink-0 border-b border-border-muted bg-surface-1/40 backdrop-blur-sm">
        <div class="flex items-center justify-between px-4 py-2">
          <!-- Admin button -->
          <button onclick="showAdmin()"
            class="w-7 h-7 rounded-lg bg-surface-3/80 border border-border hover:border-border-light flex items-center justify-center text-txt-dim hover:text-txt-secondary transition-all duration-200"
            title="Administration (A)">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          </button>
          <!-- Slide navigation -->
          <div class="flex items-center gap-2">
            <button id="slidePrevBtn" onclick="prevSlide()"
              class="inline-flex items-center gap-1 px-2.5 py-1.5 rounded-lg bg-surface-3 border border-border text-txt-secondary text-[11px] font-medium hover:bg-surface-4 hover:text-txt-primary disabled:opacity-25 disabled:cursor-not-allowed transition-all duration-150">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <span id="slideIndicator" class="text-[11px] font-semibold text-txt-muted tabular-nums tracking-wide min-w-[3rem] text-center">—</span>
            <button id="slideNextBtn" onclick="nextSlide()"
              class="inline-flex items-center gap-1 px-2.5 py-1.5 rounded-lg bg-surface-3 border border-border text-txt-secondary text-[11px] font-medium hover:bg-surface-4 hover:text-txt-primary disabled:opacity-25 disabled:cursor-not-allowed transition-all duration-150">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Prompter content -->
      <div class="flex-1 flex items-center justify-center px-12 py-10 overflow-hidden">
        <div id="prompterContent" class="prompter-rendered max-w-full text-center leading-relaxed"></div>
      </div>
      <!-- Note nav bar -->
      <div class="flex-shrink-0 border-t border-border-muted bg-surface-1/60 backdrop-blur-sm">
        <div class="flex items-center justify-between px-6 py-2.5">
          <button id="notePrevBtn" onclick="prevNote()"
            class="inline-flex items-center gap-1 px-2.5 py-1.5 rounded-lg bg-surface-3 border border-border text-txt-secondary text-[11px] font-medium hover:bg-surface-4 hover:text-txt-primary disabled:opacity-25 disabled:cursor-not-allowed transition-all duration-150">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
            Préc.
          </button>
          <span id="noteIndicator" class="text-[10px] font-medium text-txt-dim tracking-wide uppercase">—</span>
          <button id="noteNextBtn" onclick="nextNote()"
            class="inline-flex items-center gap-1 px-2.5 py-1.5 rounded-lg bg-surface-3 border border-border text-txt-secondary text-[11px] font-medium hover:bg-surface-4 hover:text-txt-primary disabled:opacity-25 disabled:cursor-not-allowed transition-all duration-150">
            Suiv.
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== RIGHT HALF (slide only, clean) ===== -->
  <div class="w-1/2 flex flex-col h-full border-l border-border relative bg-surface-0">

    <!-- Slide content area — full height, no toolbar -->
    <div class="flex-1 relative overflow-hidden" id="slideArea">
      <div class="slide-gradient-bg"></div>
      <div id="slideCanvas" class="slide-canvas">
        <div id="slideContent" class="slide-rendered slide-enter"></div>
      </div>
      <canvas id="drawCanvas" class="hidden"></canvas>
    </div>

    <!-- Laser dot -->
    <div id="laserDot" class="laser-dot"></div>

  </div>
</div>


<!-- ==================== ADMIN VIEW ==================== -->
<div id="adminView" class="hidden h-full overflow-y-auto bg-surface-0">
  <div class="max-w-5xl mx-auto py-10 px-8">

    <!-- Admin header -->
    <div class="flex items-center justify-between mb-10">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 rounded-xl bg-accent-muted border border-accent/20 flex items-center justify-center">
          <svg class="w-5 h-5 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75"/></svg>
        </div>
        <div>
          <h1 class="text-xl font-bold text-txt-primary tracking-tight">Presenter</h1>
          <p class="text-xs text-txt-dim mt-0.5">Gestion des vidéos, slides et notes de tournage</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="relative">
          <select id="activeVideoSelect" onchange="setActiveVideo(this.value)"
            class="appearance-none bg-surface-2 border border-border rounded-xl pl-4 pr-10 py-2.5 text-sm text-txt-secondary font-medium focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent/30 transition-all cursor-pointer w-64">
            <option value="">Sélectionner une vidéo active</option>
          </select>
          <svg class="w-4 h-4 text-txt-dim absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
        </div>
        <button onclick="showPresentation()"
          class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-surface-3 border border-border text-txt-secondary text-sm font-medium hover:bg-surface-4 hover:text-txt-primary hover:border-border-light transition-all duration-150 shadow-card">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z"/></svg>
          Présentation
        </button>
      </div>
    </div>

    <!-- Global intro card -->
    <div class="bg-surface-2 border border-border rounded-2xl overflow-hidden mb-8 shadow-card">
      <div class="px-6 py-4 border-b border-border-muted bg-surface-3/50 flex items-center gap-3">
        <div class="w-7 h-7 rounded-lg bg-blue-500/10 flex items-center justify-center">
          <svg class="w-3.5 h-3.5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.331 0 4.472.89 6.064 2.346m0-12.304A8.966 8.966 0 0118 3.75c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.346m0-12.304v12.304"/></svg>
        </div>
        <div>
          <h2 class="text-sm font-semibold text-txt-primary">Page d'intro globale</h2>
          <p class="text-[11px] text-txt-dim">Affichée en page 1 du prompteur pour toutes les vidéos</p>
        </div>
      </div>
      <div class="p-6">
        <textarea id="globalIntroInput" rows="3" oninput="saveGlobalIntro()"
          class="w-full bg-surface-1 border border-border rounded-xl px-4 py-3 text-sm text-txt-primary placeholder:text-txt-dim focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent/30 resize-y min-h-[80px] transition-all font-sans"
          placeholder="Bonjour et bienvenue dans cette vidéo..."></textarea>
      </div>
    </div>

    <!-- Video list -->
    <div id="adminVideoList">
      <div class="flex items-center justify-between mb-5">
        <div class="flex items-center gap-3">
          <div class="w-7 h-7 rounded-lg bg-accent-muted flex items-center justify-center">
            <svg class="w-3.5 h-3.5 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.375 19.5h17.25m-17.25 0a1.125 1.125 0 01-1.125-1.125M3.375 19.5h1.5C5.496 19.5 6 18.996 6 18.375m-3.75 0V5.625m0 12.75v-1.5c0-.621.504-1.125 1.125-1.125m18.375 2.625V5.625m0 12.75c0 .621-.504 1.125-1.125 1.125m1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125m0 3.75h-1.5A1.125 1.125 0 0118 18.375M20.625 4.5H3.375m17.25 0c.621 0 1.125.504 1.125 1.125M20.625 4.5h-1.5C18.504 4.5 18 5.004 18 5.625m3.75 0v1.5c0 .621-.504 1.125-1.125 1.125M3.375 4.5c-.621 0-1.125.504-1.125 1.125M3.375 4.5h1.5C5.496 4.5 6 5.004 6 5.625m-3.75 0v1.5c0 .621.504 1.125 1.125 1.125m0 0h1.5m-1.5 0c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125m1.5-3.75C5.496 8.25 6 7.746 6 7.125v-1.5M4.875 8.25C5.496 8.25 6 8.754 6 9.375v1.5m0-5.25v5.25m0-5.25C6 5.004 6.504 4.5 7.125 4.5h9.75c.621 0 1.125.504 1.125 1.125m1.125 2.625h1.5m-1.5 0A1.125 1.125 0 0118 7.125v-1.5m1.125 2.625c-.621 0-1.125.504-1.125 1.125v1.5m2.625-2.625c.621 0 1.125.504 1.125 1.125v1.5c0 .621-.504 1.125-1.125 1.125M18 5.625v5.25M7.125 12h9.75m-9.75 0A1.125 1.125 0 016 10.875M7.125 12C6.504 12 6 12.504 6 13.125m0-2.25C6 11.496 5.496 12 4.875 12M18 10.875c0 .621-.504 1.125-1.125 1.125M18 10.875c0 .621.504 1.125 1.125 1.125m-2.25 0c.621 0 1.125.504 1.125 1.125m-12 5.25v-5.25m0 5.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125m-12 0v-1.5c0-.621-.504-1.125-1.125-1.125M18 18.375v-5.25m0 5.25v-1.5c0-.621.504-1.125 1.125-1.125M18 13.125v1.5c0 .621.504 1.125 1.125 1.125M18 13.125c0-.621.504-1.125 1.125-1.125M6 13.125v1.5c0 .621-.504 1.125-1.125 1.125M6 13.125C6 12.504 5.496 12 4.875 12m-1.5 0h1.5m-1.5 0c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125M19.125 12h1.5m0 0c.621 0 1.125.504 1.125 1.125v1.5c0 .621-.504 1.125-1.125 1.125m-17.25 0h1.5m14.25 0h1.5"/></svg>
          </div>
          <h2 class="text-base font-semibold text-txt-primary">Vidéos</h2>

      <!-- Table -->
      <div class="bg-surface-2 border border-border rounded-2xl overflow-hidden shadow-card">
        <table class="w-full">
          <thead>
            <tr class="bg-surface-3/60">
              <th class="text-left px-5 py-3.5 text-[11px] font-semibold text-txt-dim uppercase tracking-wider cursor-pointer hover:text-txt-secondary transition-colors select-none" onclick="sortVideos('title')">
                <span class="inline-flex items-center gap-1">Titre <svg class="w-3 h-3 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15L12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9"/></svg></span>
              </th>
              <th class="text-left px-5 py-3.5 text-[11px] font-semibold text-txt-dim uppercase tracking-wider cursor-pointer hover:text-txt-secondary transition-colors select-none" onclick="sortVideos('date')">
                <span class="inline-flex items-center gap-1">Date <svg class="w-3 h-3 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15L12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9"/></svg></span>
              </th>
              <th class="text-left px-5 py-3.5 text-[11px] font-semibold text-txt-dim uppercase tracking-wider cursor-pointer hover:text-txt-secondary transition-colors select-none" onclick="sortVideos('status')">
                <span class="inline-flex items-center gap-1">Statut <svg class="w-3 h-3 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15L12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9"/></svg></span>
              </th>
              <th class="text-left px-5 py-3.5 text-[11px] font-semibold text-txt-dim uppercase tracking-wider">Slides</th>

          </thead>
          <tbody id="videoTableBody" class="divide-y divide-border-muted"></tbody>

        <div id="emptyVideoMsg" class="hidden text-center py-14">
          <div class="w-12 h-12 rounded-2xl bg-surface-3 border border-border mx-auto mb-4 flex items-center justify-center">
            <svg class="w-6 h-6 text-txt-dim" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>

    <div id="adminVideoDetail" class="hidden">

        class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-surface-2 border border-border text-txt-secondary text-sm font-medium hover:bg-surface-3 hover:text-txt-primary transition-all duration-150 mb-6">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
        Retour à la liste
      </button>

      <!-- Video meta card -->
      <div class="bg-surface-2 border border-border rounded-2xl overflow-hidden mb-8 shadow-card">
        <div class="px-6 py-4 border-b border-border-muted bg-surface-3/50 flex items-center gap-3">
          <div class="w-7 h-7 rounded-lg bg-purple-500/10 flex items-center justify-center">
            <svg class="w-3.5 h-3.5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>

              <label class="text-[11px] font-semibold text-txt-dim uppercase tracking-wider">Titre</label>

                class="w-full bg-surface-1 border border-border rounded-xl px-4 py-2.5 text-sm text-txt-primary focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent/30 transition-all font-sans">
            </div>
            <div class="space-y-1.5">
              <label class="text-[11px] font-semibold text-txt-dim uppercase tracking-wider">Date d'enregistrement</label>
              <input type="date" id="editDate" oninput="saveVideoDetail()"
                class="w-full bg-surface-1 border border-border rounded-xl px-4 py-2.5 text-sm text-txt-primary focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent/30 transition-all font-sans">
            </div>
            <div class="space-y-1.5">
              <label class="text-[11px] font-semibold text-txt-dim uppercase tracking-wider">Statut</label>
              <div class="relative">
                <select id="editStatus" onchange="saveVideoDetail()"
                  class="appearance-none w-full bg-surface-1 border border-border rounded-xl px-4 py-2.5 text-sm text-txt-primary focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent/30 transition-all cursor-pointer font-sans">
                  <option value="to_record">À tourner</option>
                  <option value="recorded">Tourné</option>
                  <option value="edited">Monté</option>
                  <option value="published">Publié</option>
                </select>
                <svg class="w-4 h-4 text-txt-dim absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
              </div>
            </div>
          </div>

      </div>

      <!-- Slides editor -->
      <div class="flex items-center justify-between mb-5">
        <div class="flex items-center gap-3">
          <div class="w-7 h-7 rounded-lg bg-emerald-500/10 flex items-center justify-center">
            <svg class="w-3.5 h-3.5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/></svg>
          </div>
          <h2 class="text-base font-semibold text-txt-primary">Slides</h2>
          <span id="slideCount" class="text-[11px] font-medium text-txt-dim bg-surface-3 px-2 py-0.5 rounded-full">0</span>
        </div>
        <button onclick="addSlide()"
          class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-accent hover:bg-accent-dark text-white text-sm font-semibold transition-all duration-150 shadow-glow">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
          Ajouter une slide
        </button>
      </div>
      <div id="slidesEditor" class="space-y-4"></div>

  </div>
</div>


<script>
// ========== STATE ==========
let state = {
  videos: [],
  globalIntro: '',
  activeVideoId: null,
  currentSlideIndex: 0,
  currentNoteIndex: 0,
  currentView: 'presentation',
  editingVideoId: null,
  currentTool: 'normal',
  sortField: 'date',
  sortDir: 1
};

// ========== PERSISTENCE ==========
function loadState() {
  state.videos = JSON.parse(localStorage.getItem('rc_videos') || '[]');
  state.globalIntro = localStorage.getItem('rc_globalIntro') || '';
  state.activeVideoId = localStorage.getItem('rc_activeVideoId') || null;
  if (state.activeVideoId && !state.videos.find(v => v.id === state.activeVideoId)) state.activeVideoId = null;
}
function saveVideos() { localStorage.setItem('rc_videos', JSON.stringify(state.videos)); }
function saveGlobalIntro() {
  state.globalIntro = document.getElementById('globalIntroInput').value;
  localStorage.setItem('rc_globalIntro', state.globalIntro);
}
function saveActiveVideo() { localStorage.setItem('rc_activeVideoId', state.activeVideoId || ''); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

// ========== HELPERS ==========
function getActiveVideo() { return state.videos.find(v => v.id === state.activeVideoId) || null; }
function getActiveSlide() {
  const v = getActiveVideo();
  if (!v || !v.slides.length) return null;
  return v.slides[state.currentSlideIndex] || null;
}

// ========== STATUS MAPS ==========
const statusLabels = { to_record: 'À tourner', recorded: 'Tourné', edited: 'Monté', published: 'Publié' };
const statusColors = {
  to_record: 'bg-amber-500/10 text-amber-400 border-amber-500/20',
  recorded: 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20',
  edited: 'bg-violet-500/10 text-violet-400 border-violet-500/20',
  published: 'bg-cyan-500/10 text-cyan-400 border-cyan-500/20'
};
const statusDots = { to_record: 'bg-amber-400', recorded: 'bg-emerald-400', edited: 'bg-violet-400', published: 'bg-cyan-400' };

// ========== SIDEBAR VIDEOS ==========
function renderSidebarVideos() {
  const container = document.getElementById('sidebarVideoList');
  if (!state.videos.length) {
    container.innerHTML = '<p class="text-[11px] text-txt-dim text-center py-6 px-2">Aucune vidéo.<br>Ouvrez l\'admin (A) pour en créer.</p>';
    return;
  }
  container.innerHTML = state.videos.map(v => {
    const isActive = v.id === state.activeVideoId;
    return `
      <button onclick="selectVideo('${v.id}')"
        class="w-full text-left px-3 py-2.5 rounded-xl flex items-center gap-2.5 transition-all duration-150 group
        ${isActive
          ? 'bg-accent/10 border border-accent/20'
          : 'hover:bg-surface-3 border border-transparent'}">
        <div class="w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0
          ${isActive ? 'bg-accent text-white' : 'bg-surface-3 text-txt-dim group-hover:bg-surface-4'}">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z"/></svg>
        </div>
        <div class="min-w-0 flex-1">
          <div class="text-[12px] font-semibold truncate ${isActive ? 'text-accent-light' : 'text-txt-secondary group-hover:text-txt-primary'}">${escHtml(v.title || 'Sans titre')}</div>
          <div class="flex items-center gap-1.5 mt-0.5">
            <span class="w-1.5 h-1.5 rounded-full flex-shrink-0 ${statusDots[v.status] || 'bg-txt-dim'}"></span>
            <span class="text-[10px] text-txt-dim">${statusLabels[v.status] || v.status}</span>
            <span class="text-[10px] text-txt-dim">· ${v.slides.length} slide${v.slides.length > 1 ? 's' : ''}</span>
          </div>
        </div>
      </button>`;
  }).join('');
}

function selectVideo(id) {
  state.activeVideoId = id;
  state.currentSlideIndex = 0;
  state.currentNoteIndex = 0;
  saveActiveVideo();
  clearCanvas();
  renderPresentation();
}

// ========== PRESENTATION RENDER ==========
// ========== FIXED-CANVAS SCALING ==========
const CANVAS_W = 960, CANVAS_H = 540;

function scaleSlide() {
  const area = document.getElementById('slideArea');
  const canvas = document.getElementById('slideCanvas');
  if (!area || !canvas) return;
  const aw = area.clientWidth, ah = area.clientHeight;
  const scale = Math.min(aw / CANVAS_W, ah / CANVAS_H) * 0.95; // 5% margin
  canvas.style.transform = `translate(-50%, -50%) scale(${scale})`;
}

function updateProgressBar() {
  const video = getActiveVideo();
  const bar = document.getElementById('progressBar');
  if (!video || !video.slides.length) { bar.style.width = '0%'; return; }
  const pct = ((state.currentSlideIndex + 1) / video.slides.length) * 100;
  bar.style.width = pct + '%';
}

function renderPresentation() {
  const video = getActiveVideo();
  const slide = getActiveSlide();

  renderSidebarVideos();
  updateProgressBar();

  const sc = document.getElementById('slideContent');
  const slideArea = document.getElementById('slideArea');

  // Remove old layout classes
  slideArea.className = slideArea.className.replace(/layout-\w+/g, '').trim();
  slideArea.classList.add('flex-1', 'relative', 'overflow-hidden');

  if (slide) {
    // Apply layout class
    const layout = slide.layout || 'default';
    if (layout !== 'default') slideArea.classList.add('layout-' + layout);

    const content = slide.content || '';
    sc.innerHTML = formatContent(content);

    // Re-trigger entry animation
    sc.classList.remove('slide-enter');
    void sc.offsetWidth;
    sc.classList.add('slide-enter');
  } else if (video) {
    sc.innerHTML = `
      <div class="text-center space-y-4">
        <div class="w-16 h-16 rounded-2xl bg-surface-2 border border-border mx-auto flex items-center justify-center">
          <svg class="w-8 h-8 text-txt-dim" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6z"/></svg>
        </div>
        <p class="text-txt-muted text-base">Aucune slide</p>
        <p class="text-txt-dim text-sm">Ouvrez l'admin pour ajouter des slides</p>
      </div>`;
  } else {
    sc.innerHTML = `
      <div class="text-center space-y-4">
        <div class="w-16 h-16 rounded-2xl bg-accent-muted border border-accent/20 mx-auto flex items-center justify-center">
          <svg class="w-8 h-8 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        </div>
        <p class="text-txt-secondary text-lg font-medium">Presenter</p>
        <p class="text-txt-dim text-sm">Appuyez sur <kbd class="px-2 py-0.5 rounded-md bg-surface-3 border border-border text-[11px] font-mono">A</kbd> pour ouvrir l'admin</p>
      </div>`;
  }

  if (video && video.slides.length) {
    document.getElementById('slideIndicator').textContent = `${state.currentSlideIndex + 1} / ${video.slides.length}`;
    document.getElementById('slidePrevBtn').disabled = state.currentSlideIndex === 0;
    document.getElementById('slideNextBtn').disabled = state.currentSlideIndex >= video.slides.length - 1;
  } else {
    document.getElementById('slideIndicator').textContent = '—';
    document.getElementById('slidePrevBtn').disabled = true;
    document.getElementById('slideNextBtn').disabled = true;
  }

  renderNotes();
  resizeCanvas();
  scaleSlide();
}

function renderNotes() {
  const slide = getActiveSlide();
  const notePages = buildNotePages(slide);
  const total = notePages.length;
  if (state.currentNoteIndex >= total) state.currentNoteIndex = total - 1;
  if (state.currentNoteIndex < 0) state.currentNoteIndex = 0;

  const content = notePages[state.currentNoteIndex] || '';
  document.getElementById('prompterContent').innerHTML = content
    ? `<div class="prompter-rendered">${formatContent(content)}</div>`
    : '<p class="text-txt-dim text-lg italic">Aucune note</p>';

  document.getElementById('noteIndicator').textContent = total > 0 ? `note ${state.currentNoteIndex + 1} / ${total}` : '—';
  document.getElementById('notePrevBtn').disabled = state.currentNoteIndex === 0;
  document.getElementById('noteNextBtn').disabled = state.currentNoteIndex >= total - 1;
}

function buildNotePages(slide) {
  const pages = [];
  if (state.globalIntro) pages.push(state.globalIntro);
  if (slide && slide.notes) slide.notes.forEach(n => { if (n.trim()) pages.push(n); });
  return pages;
}

// ========== SLIDE NAV ==========
function prevSlide() {
  if (state.currentSlideIndex > 0) { state.currentSlideIndex--; state.currentNoteIndex = 0; clearCanvas(); renderPresentation(); }
}
function nextSlide() {
  const v = getActiveVideo();
  if (v && state.currentSlideIndex < v.slides.length - 1) { state.currentSlideIndex++; state.currentNoteIndex = 0; clearCanvas(); renderPresentation(); }
}

// ========== NOTE NAV ==========
function prevNote() { if (state.currentNoteIndex > 0) { state.currentNoteIndex--; renderNotes(); } }
function nextNote() {
  const total = buildNotePages(getActiveSlide()).length;
  if (state.currentNoteIndex < total - 1) { state.currentNoteIndex++; renderNotes(); }
}

// ========== SIDEBAR ==========
function toggleSidebar() {
  const wrap = document.getElementById('sidebarWrap');
  const chevron = document.getElementById('sidebarChevron');
  wrap.classList.toggle('collapsed');
  chevron.style.transform = wrap.classList.contains('collapsed') ? 'rotate(180deg)' : '';
}

// ========== DRAWING ==========
let isDrawing = false, lastX = 0, lastY = 0;

function setTool(tool) {
  state.currentTool = tool;
  const canvas = document.getElementById('drawCanvas');
  const laserDot = document.getElementById('laserDot');

  canvas.classList.remove('cursor-pen', 'cursor-highlighter', 'cursor-laser');
  laserDot.style.display = 'none';

  if (tool === 'normal') {
    canvas.classList.add('hidden');
  } else {
    canvas.classList.remove('hidden');
    resizeCanvas();
    canvas.classList.add('cursor-' + tool);
  }
}

function resizeCanvas() {
  const canvas = document.getElementById('drawCanvas');
  const area = document.getElementById('slideArea');
  canvas.width = area.offsetWidth;
  canvas.height = area.offsetHeight;
}

function initCanvas() {
  const canvas = document.getElementById('drawCanvas');
  canvas.addEventListener('mousedown', e => {
    if (state.currentTool === 'laser') return;
    isDrawing = true;
    const r = canvas.getBoundingClientRect();
    lastX = e.clientX - r.left; lastY = e.clientY - r.top;
  });
  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    const x = e.clientX - r.left, y = e.clientY - r.top;
    if (state.currentTool === 'laser') {
      const dot = document.getElementById('laserDot');
      dot.style.display = 'block'; dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
      return;
    }
    if (!isDrawing) return;
    const ctx = canvas.getContext('2d');
    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y);
    if (state.currentTool === 'pen') { ctx.strokeStyle = '#f85526'; ctx.lineWidth = 2.5; ctx.globalAlpha = 1; }
    else if (state.currentTool === 'highlighter') { ctx.strokeStyle = '#facc15'; ctx.lineWidth = 22; ctx.globalAlpha = 0.3; }
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke(); ctx.globalAlpha = 1;
    lastX = x; lastY = y;
  });
  canvas.addEventListener('mouseup', () => { isDrawing = false; });
  canvas.addEventListener('mouseleave', () => { isDrawing = false; if (state.currentTool === 'laser') document.getElementById('laserDot').style.display = 'none'; });
}

function clearCanvas() {
  const c = document.getElementById('drawCanvas');
  c.getContext('2d').clearRect(0, 0, c.width, c.height);
}

// ========== VIEWS ==========
function showAdmin() {
  state.currentView = 'admin';
  document.getElementById('presentationView').classList.add('hidden');
  document.getElementById('adminView').classList.remove('hidden');
  renderAdmin();
}
function showPresentation() {
  state.currentView = 'presentation';
  document.getElementById('adminView').classList.add('hidden');
  document.getElementById('presentationView').classList.remove('hidden');
  state.currentSlideIndex = 0; state.currentNoteIndex = 0;
  renderPresentation();
}

// ========== ADMIN ==========

function renderAdmin() {
  document.getElementById('globalIntroInput').value = state.globalIntro;
  renderActiveVideoSelect();
  renderVideoTable();
  if (state.editingVideoId) showVideoDetail(state.editingVideoId);
  else { document.getElementById('adminVideoList').classList.remove('hidden'); document.getElementById('adminVideoDetail').classList.add('hidden'); }
}

function renderActiveVideoSelect() {
  const sel = document.getElementById('activeVideoSelect');
  sel.innerHTML = '<option value="">Sélectionner une vidéo active</option>';
  state.videos.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.id; opt.textContent = v.title || 'Sans titre';
    if (v.id === state.activeVideoId) opt.selected = true;
    sel.appendChild(opt);
  });
}

function setActiveVideo(id) { state.activeVideoId = id || null; saveActiveVideo(); }

  const emptyMsg = document.getElementById('emptyVideoMsg');
  document.getElementById('videoCount').textContent = state.videos.length;

  const sorted = [...state.videos].sort((a, b) => {
    const va = a[state.sortField] || '', vb = b[state.sortField] || '';

  });

  if (!sorted.length) { tbody.innerHTML = ''; emptyMsg.classList.remove('hidden'); return; }
  emptyMsg.classList.add('hidden');

    <tr class="group hover:bg-surface-3/40 transition-colors duration-150">

        <div class="flex items-center gap-3">

function sortVideos(field) {
  if (state.sortField === field) state.sortDir *= -1;
  else { state.sortField = field; state.sortDir = 1; }
  renderVideoTable();
}

function addVideo() {
  const v = { id: uid(), title: 'Nouvelle vidéo', date: new Date().toISOString().split('T')[0], status: 'to_record', slides: [] };
  state.videos.push(v); saveVideos(); showVideoDetail(v.id);
}

function deleteVideo(id) {
  if (!confirm('Supprimer cette vidéo ?')) return;
  state.videos = state.videos.filter(v => v.id !== id);
  if (state.activeVideoId === id) { state.activeVideoId = null; saveActiveVideo(); }
  saveVideos(); state.editingVideoId = null; renderAdmin();
}

// ========== VIDEO DETAIL ==========
function showVideoDetail(id) {
  state.editingVideoId = id;
  const v = state.videos.find(v => v.id === id);
  if (!v) return;
  document.getElementById('adminVideoList').classList.add('hidden');
  document.getElementById('adminVideoDetail').classList.remove('hidden');
  document.getElementById('editTitle').value = v.title;
  document.getElementById('editDate').value = v.date;
  document.getElementById('editStatus').value = v.status;
  renderSlidesEditor(v);
}

function backToList() {
  state.editingVideoId = null;
  document.getElementById('adminVideoDetail').classList.add('hidden');
  document.getElementById('adminVideoList').classList.remove('hidden');
  renderVideoTable(); renderActiveVideoSelect();
}

function saveVideoDetail() {
  const v = state.videos.find(v => v.id === state.editingVideoId);
  if (!v) return;
  v.title = document.getElementById('editTitle').value;
  v.date = document.getElementById('editDate').value;
  v.status = document.getElementById('editStatus').value;
  saveVideos();
}

// ========== SLIDES EDITOR ==========

            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5"/></svg>
          </button>
          <button onclick="moveSlide(${i},1)" ${i === video.slides.length - 1 ? 'disabled' : ''}
            class="w-7 h-7 rounded-lg flex items-center justify-center text-txt-dim hover:text-txt-secondary hover:bg-surface-4 disabled:opacity-20 disabled:cursor-not-allowed transition-all">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>

          <button onclick="deleteSlide(${i})"

          </div>

            <label class="text-[11px] font-semibold text-txt-dim uppercase tracking-wider">Contenu (Markdown)</label>
            <textarea rows="3" oninput="updateSlide(${i},'content',this.value)"
              class="w-full bg-surface-1 border border-border rounded-xl px-4 py-2.5 text-sm text-txt-primary focus:border-accent focus:outline-none focus:ring-1 focus:ring-accent/30 transition-all font-sans resize-y min-h-[70px]">${escHtml(s.content)}</textarea>

        <!-- Notes section -->
        <div class="border-t border-border-muted pt-4">

              <svg class="w-3.5 h-3.5 text-txt-dim" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
              <span class="text-[11px] font-semibold text-txt-dim uppercase tracking-wider">Notes de tournage</span>

            </div>
            <button onclick="addNote(${i})"
              class="inline-flex items-center gap-1 px-3 py-1.5 rounded-lg bg-surface-3 border border-border text-txt-secondary text-xs font-medium hover:bg-surface-4 hover:text-txt-primary transition-all">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
              Note

          <div class="space-y-2">

              <div class="flex gap-2 items-start group/note">

                <button onclick="deleteNote(${i},${ni})"
                  class="flex-shrink-0 w-7 h-7 rounded-lg flex items-center justify-center text-red-400/40 hover:text-red-400 hover:bg-red-500/10 transition-all mt-2 opacity-0 group-hover/note:opacity-100">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>

            ${s.notes.length === 0 ? '<p class="text-txt-dim text-xs italic pl-7">Aucune note pour cette slide</p>' : ''}
          </div>
        </div>
      </div>
    </div>

function addSlide() {
  const v = state.videos.find(v => v.id === state.editingVideoId); if (!v) return;
  v.slides.push({ id: uid(), title: 'Nouvelle slide', content: '', notes: [] });
  saveVideos(); renderSlidesEditor(v);
}
function deleteSlide(i) {
  const v = state.videos.find(v => v.id === state.editingVideoId); if (!v) return;
  v.slides.splice(i, 1); saveVideos(); renderSlidesEditor(v);
}
function moveSlide(i, dir) {
  const v = state.videos.find(v => v.id === state.editingVideoId); if (!v) return;
  const j = i + dir; if (j < 0 || j >= v.slides.length) return;
  [v.slides[i], v.slides[j]] = [v.slides[j], v.slides[i]]; saveVideos(); renderSlidesEditor(v);
}
function updateSlide(i, field, value) {
  const v = state.videos.find(v => v.id === state.editingVideoId); if (!v) return;
  v.slides[i][field] = value; saveVideos();
}
function addNote(si) {
  const v = state.videos.find(v => v.id === state.editingVideoId); if (!v) return;
  v.slides[si].notes.push(''); saveVideos(); renderSlidesEditor(v);
}
function updateNote(si, ni, val) {
  const v = state.videos.find(v => v.id === state.editingVideoId); if (!v) return;
  v.slides[si].notes[ni] = val; saveVideos();
}
function deleteNote(si, ni) {
  const v = state.videos.find(v => v.id === state.editingVideoId); if (!v) return;
  v.slides[si].notes.splice(ni, 1); saveVideos(); renderSlidesEditor(v);
}

// ========== UTILS ==========
function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function escAttr(s) { return (s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function formatContent(text) {
  if (!text) return '';
  // Extract special syntaxes before markdown processing
  let bgNumber = '';
  let t = text;

  // Extract {{bg:N}}
  t = t.replace(/\{\{bg:(\w+)\}\}/g, (_, n) => { bgNumber = n; return ''; });

  // Fix smart quotes and orphan punctuation
  t = t
    .replace(/'/g, "\u2019")
    .replace(/ ([?!:;])/g, "\u00A0$1")
    .replace(/"([^"]+)"/g, "\u00AB\u00A0$1\u00A0\u00BB");

  // Custom rich syntaxes
  t = t.replace(/\{\{keyword:([^}]+)\}\}/g, '<span class="keyword">$1</span>');
  t = t.replace(/\{\{stat:([^|]+)\|([^}]+)\}\}/g, '<div class="stat-block"><span class="stat-number">$1</span><span class="stat-label">$2</span></div>');
  t = t.replace(/\{\{hl:([^}]+)\}\}/g, '<span class="hl-inline">$1</span>');

  // Markdown rendering
  t = t
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/<\/blockquote>\n?<blockquote>/g, '<br>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, function(m) { return '<ul>' + m + '</ul>'; })
    .replace(/<\/ul>\s*<ul>/g, '')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');

  // Append bg number if present
  if (bgNumber) {
    t += `<div class="bg-number">${bgNumber}</div>`;
  }

  return t;
}

// ========== KEYBOARD ==========
document.addEventListener('keydown', e => {
  if (state.currentView !== 'presentation') {
    if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
    if (e.key === 'Escape' || e.key === 'a') { showPresentation(); return; }
    return;
  }
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  switch (e.key) {
    case 'ArrowRight': e.preventDefault(); nextSlide(); break;
    case 'ArrowLeft': e.preventDefault(); prevSlide(); break;
    case 'ArrowDown': e.preventDefault(); nextNote(); break;
    case 'ArrowUp': e.preventDefault(); prevNote(); break;
    case 'Escape': setTool('normal'); break;
    case 'a': showAdmin(); break;
  }
});

// ========== RESIZE ==========
window.addEventListener('resize', () => { if (state.currentView === 'presentation') { resizeCanvas(); scaleSlide(); } });

// ========== INIT ==========
async function init() {
  // Load data.json first, fallback to localStorage
  try {
    const res = await fetch('data.json?' + Date.now());
    if (res.ok) {
      const data = await res.json();
      state.videos = data.videos || [];
      state.globalIntro = data.globalIntro || '';
      state.activeVideoId = data.activeVideoId || (state.videos.length ? state.videos[0].id : null);
      // Sync to localStorage for admin edits
      localStorage.setItem('rc_videos', JSON.stringify(state.videos));
      localStorage.setItem('rc_globalIntro', state.globalIntro);
      localStorage.setItem('rc_activeVideoId', state.activeVideoId || '');
    } else {
      loadState();
    }
  } catch (e) {
    loadState();
  }
  initCanvas();
  renderPresentation();
}
init();
</script>
